<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="forms_and_events.css" />
    <title>Формы и события</title>
</head>
<!--<body onmousemove="traceMouse(event)">-->
<body class="light">
    <div class="header">
        <div>Header</div>
        <div id="mouse"></div>
        <div id="debug-background"></div>
        <!--<img src="moon.png" id="switch-background">-->
        <div id="switch-background"></div>
    </div>
    <hr>
    <!-- -------------------------------------------------------- -->
    <h1>Формы и события</h1>
    <details>
        <div>
            <h2>Factorial</h2>
            <div class="task">
                <!--<div class="pair">
                </div>-->
                <label for="number">Введите целое число от 0 до 170:</label>                   <!--for должен совпадать с id-->
                <input id="number" type="number" min="0" max="5" onchange="Factorial()">       <!--input - поле ввода-->
                <button onclick="Factorial()">Вычислить</button>
            </div>
            <div id="factorial-result" class="result"></div>                                   <!--factorial double = 170, factorial int = 12-->
            <!--<input id="factorial-result" class="result" type="text" >-->
            <hr>
            <h2>Power</h2>
            <div class="task">
            </div>
        </div>
    </details>

    <!-- -------------------------------------------------------- -->

    <div class="images-and-colors">
        <div class="upload-image">
            <div class="image-container">
                <img alt="Фото студента" id="image">
            </div>
            <input type="file" id="image-file" onchange="setImage()">
        </div>

        <div class="colors">
            <div class="select-color">
                <label for="background-color">Цвет фона</label>
                <input type="color" id="background-color" value="white" oninput='setColor(event)'>
            </div>
            <!--e - eventArgs (аргументы события). EventArgs выступает как обработчик события.
            Обработчик события - это самая обычная функция которая всегда принимает одни те же
            параметры. В C# принимает ObjectSender и EventArgs, а в JavaScript принимает только
            EventArgs. EventArgs обычно обозначается буквой e.-->
            <!--target - это элемент control (элемент управления) для которого отрабатывает этот event.-->
            <div class="select-color">
                <label for="foreground-color">Цвет текста</label>
                <input type="color" id="foreground-color" oninput='setColor(event)'>
            </div>
        </div>
    </div>
    <script src="forms_and_events.js"></script>
</body>
</html>
