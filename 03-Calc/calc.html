<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="calc.css">
    <title>Калькулятор</title>

</head>
<body>
    <div class="main-window">
        <div class="title-bar">
            <div class="title-bar-left-side">
                <img src="CalcXP.ico" class="app-icon" />
                <div>&#8211 Калькулятор</div>
            </div>
            <div class="title-bar-right-side">
                <button class="control-button minimaze-button">&#x1F5D5;</button>
                <button class="control-button" disabled>&#128470;</button>
                <button class="control-button close-button">&#10006;</button>
            </div>
        </div>
        <!-- ----------------------------------------------------------------------------- -->
        <div class="client-rect">
            <div class="main-line">
                <button class="edit-button">Edit</button>
                <button class="view-button">View</button>
                <button class="exit-button">Exit</button>
            </div>
            <div class="main-line">
                 <div class="display-field"></div>
            </div>
            <div class="main-line">
                <button class="empty-button"></button>
                <button class="back-button">Backspace</button>
                <button class="ce-button">CE</button>           <!--CE - Clean Entry-->
                <button class="clr-button">С</button>           <!--C - Clear-->
            </div>
            <div class="main-line">
                <button class="mc-button">MC</button>           <!--MC - Memory Clean-->
                <button class="standart-button left-button blue-but">7</button>
                <button class="standart-button blue-but">8</button>
                <button class="standart-button blue-but">9</button>
                <button class="standart-button red-but">/</button>
                <button class="standart-button blue-but">sqrt</button>
            </div>
            <div class="main-line">
                <button class="mr-button">MR</button>                 <!--MR - Memory Read-->
                <button class="standart-button left-button blue-but">4</button>
                <button class="standart-button blue-but">5</button>
                <button class="standart-button blue-but">6</button>
                <button class="standart-button red-but">*</button>
                <button class="standart-button blue-but">%</button>
            </div>
            <div class="main-line">
                <button class="ms-button">MS</button>               <!--MS - Memory Save-->
                <button class="standart-button left-button blue-but">1</button>
                <button class="standart-button blue-but">2</button>
                <button class="standart-button blue-but">3</button>
                <button class="standart-button red-but">-</button>
                <button class="standart-button blue-but">1/x</button>
            </div>
            <div class="main-line">
                <button class="mpls-button">M+</button>
                <button class="standart-button null-button blue-but">0</button>
                <button class="standart-button blue-but">+/-</button>
                <button class="standart-button blue-but">.</button>
                <button class="standart-button red-but">+</button>
                <button class="standart-button red-but">=</button>
            </div>
        </div>
    </div>
</body>
</html>
