<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="calc.css">
    <title>Калькулятор</title>

</head>
<body>
    <div class="main-window">
        <div class="title-bar">
            <div class="title-bar-left-side">
                <img src="CalcXP.ico" class="app-icon" />
                <div>&#8211 Калькулятор</div>
            </div>
            <div class="title-bar-right-side">
                <button class="control-button">&#x1F5D5;</button>
                <button class="control-button" disabled>&#128470;</button>
                <button class="control-button close-button">&#10006;</button>
            </div>
        </div>
        <!-- ----------------------------------------------------------------------------- -->
        <div class="client-rect">
            <div class="main-line">
                <button class="edit-button">Edit</button>
                <button class="view-button">View</button>
                <button class="exit-button">Exit</button>
            </div>
            <div class="main-line">
                 <div class="display-field"></div>
            </div>
            <div class="main-line">
                <button class="empty-button"></button>
                <button class="back-button">Backspace</button>
                <button class="ce-button">CE</button>           <!--CE - Clean Entry-->
                <button class="clr-button">С</button>           <!--C - Clear-->
            </div>
            <div class="main-line">
                <button class="mc-button">MC</button>           <!--MC - Memory Clean-->
                <button class="seven-num">7</button>
                <button class="eight-num">8</button>
                <button class="nine-num">9</button>
                <button class="divide-button">/</button>
                <button class="sqrt-button">sqrt</button>
            </div>
            <div class="main-line">
                <button class="mr-button">MR</button>                 <!--MR - Memory Read-->
                <button four-num>4</button>
                <button five-num>5</button>
                <button six-num>6</button>
                <button multi-button>*</button>
                <button percent-button>%</button>
            </div>
            <div class="main-line">
                <button class="ms-button">MS</button>               <!--MS - Memory Save-->
                <button unit-num>1</button>
                <button two-num>2</button>
                <button three-num>3</button>
                <button minus-button>-</button>
                <button degree-button>1/x</button>
            </div>
            <div class="main-line">
                <button class="mpls-button">M+</button>
                <button null-num>0</button>
                <button plus-or-minus>+/-</button>
                <button point-num>.</button>
                <button plus-button>+</button>
                <button equal-button>=</button>
            </div>
        </div>
    </div>
</body>
</html>
